<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zhavior FocusReader</title>
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 24px;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
      text-align: center;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 800;
      margin: 0 0 8px 0;
      background: linear-gradient(90deg, #d8b4fe, #bae6fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    p {
      font-size: 13px;
      color: #a3a3a3;
      margin: 0 0 20px 0;
      line-height: 1.4;
    }
    
    input {
      width: 100%;
      background: #171717;
      border: 1px solid #262626;
      color: white;
      padding: 12px;
      border-radius: 8px;
      font-family: monospace;
      margin-bottom: 12px;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #3b82f6;
    }
    
    button {
      width: 100%;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 20px -5px rgba(59, 130, 246, 0.4);
    }
    
    button:hover {
      opacity: 0.9;
    }
    
    button:active {
      transform: scale(0.98);
    }
    
    .status {
      font-size: 12px;
      margin-top: 12px;
      height: 15px;
      color: #4ade80;
    }
    
    .status.error { color: #ef4444; }

    #loggedInState { display: none; }
    #loginState { display: block; }
  </style>
</head>
<body>
  <h1>Zhavior</h1>
  
  <div id="loginState">
    <p>Enter your Access Token from the Zhavior Tools Dashboard.</p>
    <input type="password" id="tokenInput" placeholder="frk_..." />
    <button id="saveBtn">Log In</button>
  </div>

  <div id="loggedInState">
    <p>You're logged in! Look for the floating <b>Focus</b> pill on any article — click it to start a session.</p>
    <button id="logoutBtn" style="background: #ef4444; box-shadow: none;">Log Out</button>
  </div>

  <div id="statusMsg" class="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
