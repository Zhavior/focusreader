<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hyperfi Reader — My Reading Library</title>
  <style>
    :root {
      --bg-dark: #0a0a0c;
      --card-bg: rgba(22, 22, 28, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --card-hover-border: rgba(168, 85, 247, 0.4);
      --accent-purple: #c084fc;
      --accent-blue: #38bdf8;
      --accent-pink: #f472b6;
      --text-main: #f3f4f6;
      --text-sub: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 15% 15%, rgba(168, 85, 247, 0.12) 0px, transparent 55%),
        radial-gradient(at 85% 85%, rgba(56, 189, 248, 0.1) 0px, transparent 55%);
      background-attachment: fixed;
      color: var(--text-main);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      min-height: 100vh;
      padding: 40px 60px;
    }

    /* Header & Navigation */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand-logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #a855f7, #3b82f6);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 25px rgba(168, 85, 247, 0.4);
      font-weight: 900;
      font-size: 24px;
      color: white;
      letter-spacing: -1px;
    }

    .brand-title h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(90deg, #ffffff, #e9d5ff, #bae6fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    .brand-title p {
      color: var(--text-sub);
      font-size: 14px;
    }

    .stats-container {
      display: flex;
      gap: 16px;
    }

    .stat-pill {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 10px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      backdrop-filter: blur(12px);
    }

    .stat-val {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent-purple);
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-sub);
      margin-top: 2px;
    }

    /* Controls Bar */
    .controls-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      max-width: 480px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 14px 20px 14px 44px;
      color: white;
      font-size: 15px;
      outline: none;
      transition: all 0.2s ease;
      backdrop-filter: blur(8px);
    }

    .search-box input:focus {
      border-color: var(--accent-purple);
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
      background: rgba(255, 255, 255, 0.08);
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-sub);
      pointer-events: none;
    }

    .tabs {
      display: flex;
      gap: 8px;
      background: rgba(255, 255, 255, 0.03);
      padding: 6px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: var(--text-sub);
      padding: 10px 22px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-btn:hover {
      color: white;
      background: rgba(255, 255, 255, 0.05);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.8), rgba(99, 102, 241, 0.8));
      color: white;
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
    }

    .actions-group {
      display: flex;
      gap: 12px;
    }

    .btn-action {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      padding: 12px 20px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .btn-action:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.4);
      color: #fca5a5;
    }

    /* Cards Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 24px;
      margin-top: 10px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      backdrop-filter: blur(16px);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: var(--card-hover-border);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(168, 85, 247, 0.15);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
      gap: 12px;
    }

    .badge-domain {
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.25);
      color: #7dd3fc;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .badge-date {
      font-size: 12px;
      color: var(--text-sub);
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: white;
      line-height: 1.4;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .card-title:hover {
      color: var(--accent-purple);
    }

    .card-meta {
      font-size: 13px;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .card-actions {
      display: flex;
      gap: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding-top: 18px;
    }

    .btn-card {
      flex: 1;
      padding: 10px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-read {
      background: linear-gradient(135deg, #a855f7, #6366f1);
      color: white;
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
    }

    .btn-read:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 20px rgba(168, 85, 247, 0.5);
    }

    .btn-fav {
      background: rgba(255, 255, 255, 0.06);
      color: #e2e8f0;
      border: 1px solid rgba(255, 255, 255, 0.08);
      max-width: 44px;
    }

    .btn-fav.active {
      color: #fbbf24;
      background: rgba(251, 191, 36, 0.12);
      border-color: rgba(251, 191, 36, 0.3);
    }

    .btn-del {
      background: rgba(255, 255, 255, 0.06);
      color: #f87171;
      border: 1px solid rgba(255, 255, 255, 0.08);
      max-width: 44px;
    }

    .btn-del:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    /* Empty State */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px dashed rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      margin-top: 20px;
    }

    .empty-icon {
      font-size: 56px;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .empty-state h3 {
      font-size: 22px;
      font-weight: 700;
      color: white;
      margin-bottom: 10px;
    }

    .empty-state p {
      max-width: 460px;
      margin: 0 auto 24px auto;
      color: var(--text-sub);
      line-height: 1.6;
      font-size: 15px;
    }

    @media (max-width: 768px) {
      body { padding: 24px; }
      header { flex-direction: column; align-items: flex-start; gap: 20px; }
      .controls-bar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <div class="brand-logo">Z</div>
      <div class="brand-title">
        <h1>Hyperfi Reader</h1>
        <p>Your collected articles, reading history & favorites</p>
      </div>
    </div>
    <div class="stats-container">
      <div class="stat-pill">
        <span class="stat-val" id="statTotal">0</span>
        <span class="stat-label">Total Read</span>
      </div>
      <div class="stat-pill">
        <span class="stat-val" id="statFavs">0</span>
        <span class="stat-label">Favorites</span>
      </div>
    </div>
  </header>

  <div class="controls-bar">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search by article title, keyword or domain...">
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="all">All Articles</button>
      <button class="tab-btn" data-tab="favs">★ Favorites Only</button>
    </div>

    <div class="actions-group">
      <button class="btn-action btn-danger" id="btnClearAll">🗑️ Clear All History</button>
    </div>
  </div>

  <div class="grid" id="cardsGrid"></div>

  <script src="library.js"></script>
</body>
</html>
