name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test

  frontend:
    name: Frontend — tests + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          # Build-time placeholders; real secrets live in the deploy platform.
          NEXT_PUBLIC_APP_URL: http://localhost:3001
          TTS_BACKEND_URL: http://localhost:4000
