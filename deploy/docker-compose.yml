# FocusReader production stack — single VPS / Cloud orchestration.
#
#   cp env.production.example .env   (fill it in)
#   docker compose up -d --build
#
# Both apps share /data (SQLite ledger + audio files). Caddy terminates TLS
# for app.<domain> and api.<domain> with automatic Let's Encrypt certs.
services:
  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.backend
    restart: unless-stopped
    user: "1000:1000"
    env_file: .env
    environment:
      DATA_DIR: /data
      TRUST_PROXY: "1"
      NODE_ENV: production
      PORT: "4000"
      TTS_PROVIDER: ""
    volumes:
      - appdata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health/live || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.frontend
    restart: unless-stopped
    user: "1000:1000"
    env_file: .env
    environment:
      DATA_DIR: /data
      TTS_BACKEND_URL: http://backend:4000
      NODE_ENV: production
      PORT: "3000"
    volumes:
      - appdata:/data
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

volumes:
  appdata:
  caddy_data:
  caddy_config:
