# FocusReader production stack — single VPS, one command.
#
#   cp env.production.example .env   (fill it in)
#   docker compose up -d --build
#
# Both apps share /data (SQLite ledger + audio files). Caddy terminates TLS
# for app.<domain> and api.<domain> with automatic Let's Encrypt certs.
services:
  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.frontend
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /data
      TTS_BACKEND_URL: http://backend:4000
    volumes:
      - appdata:/data
    depends_on:
      - backend

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /data
      TRUST_PROXY: "1"
      # No macOS `say` on Linux: production REQUIRES ELEVENLABS_API_KEY or
      # OPEN_SOURCE_TTS_URL in .env. Do not set TTS_PROVIDER=local here.
      TTS_PROVIDER: ""
    volumes:
      - appdata:/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  # OPTIONAL free neural voices (OpenAI-compatible /v1/audio/speech).
  # Unverified image pin — test before relying on it, or use ElevenLabs.
  # kokoro:
  #   image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
  #   restart: unless-stopped
  # then set OPEN_SOURCE_TTS_URL=http://kokoro:8880/v1/audio/speech in .env

volumes:
  appdata:
  caddy_data:
  caddy_config:
